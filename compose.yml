services:
  # Strapi 后端
  strapi:
    image: node:20-alpine
    container_name: company-strapi
    working_dir: /app
    volumes:
      - ./backend:/app
      - strapi_uploads:/app/public/uploads
    ports:
      - "1337:1337"
    dns:
      - 223.5.5.5
      - 8.8.8.8
    environment:
      NODE_ENV: production
      DATABASE_CLIENT: mysql
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_NAME: strapi
      DATABASE_USERNAME: strapi
      DATABASE_PASSWORD: strapi_password
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-change-in-production}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-your-admin-jwt-secret-change-in-production}
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET}
      OSS_REGION: oss-cn-chengdu
      OSS_BUCKET: cangjiexing
      OSS_ENDPOINT: oss-cn-chengdu.aliyuncs.com
      OSS_BASE_URL: https://cangjiexing.oss-cn-chengdu.aliyuncs.com
    command: sh -c "npm install && chmod +x node_modules/.bin/* && npx strapi build && npx strapi start"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - company-network

  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: company-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: strapi
      MYSQL_USER: strapi
      MYSQL_PASSWORD: strapi_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - company-network

  # Next.js 前端
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_STRAPI_URL: http://47.109.195.123:1337
        NEXT_PUBLIC_SITE_URL: http://47.109.195.123:3000
        NEXT_PUBLIC_TENCENT_MAP_KEY: ${NEXT_PUBLIC_TENCENT_MAP_KEY:-GRDBZ-VMFEQ-FN75C-4HYJZ-Y36R2-W5BUT}
    container_name: company-frontend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - strapi
    restart: unless-stopped
    networks:
      - company-network

  # OpenList 网盘
  openlist:
    image: openlistteam/openlist:latest
    container_name: openlist
    restart: always
    user: openlist
    ports:
      - "5244:5244"
    volumes:
      - /root/openlist/data:/opt/openlist/data
      - /root/openlist/share:/opt/openlist/share
    environment:
      - UMASK=022
      - RUN_ARIA2=false
    networks:
      - company-network

volumes:
  strapi_uploads:
  mysql_data:

networks:
  company-network:
    driver: bridge
